# docker-compose.yml
version: "3.8"
services:
  yolo-api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models    # Pour changer de modèle sans rebuild
    environment:
      - MODEL_PATH=/app/models/yolo11n.onnx
      - LOG_LEVEL=info
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped