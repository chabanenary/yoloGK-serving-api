<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>YOLO Detection</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 2rem; }
    h1 { font-size: 1.8rem; font-weight: 700; margin-bottom: 0.25rem; color: #f8fafc; }
    p.subtitle { color: #94a3b8; margin-bottom: 2rem; font-size: 0.95rem; }

    .card { background: #1e293b; border-radius: 12px; padding: 2rem; width: 100%; max-width: 700px; box-shadow: 0 4px 24px rgba(0,0,0,0.4); }

    .drop-zone {
      border: 2px dashed #334155;
      border-radius: 10px;
      padding: 2.5rem;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      position: relative;
    }
    .drop-zone:hover, .drop-zone.dragover { border-color: #6366f1; background: #1e2a3a; }
    .drop-zone input[type=file] { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
    .drop-zone svg { width: 40px; height: 40px; color: #475569; margin-bottom: 0.75rem; }
    .drop-zone p { color: #64748b; font-size: 0.9rem; }
    .drop-zone p span { color: #6366f1; font-weight: 600; }

    #preview-wrap { margin-top: 1.5rem; display: none; }
    #preview { width: 100%; border-radius: 8px; max-height: 400px; object-fit: contain; background: #0f172a; }

    .controls { display: flex; align-items: center; gap: 1rem; margin-top: 1.25rem; flex-wrap: wrap; }
    label.conf-label { font-size: 0.85rem; color: #94a3b8; }
    input[type=range] { flex: 1; accent-color: #6366f1; }
    #conf-value { min-width: 2.5rem; text-align: right; font-weight: 600; color: #a5b4fc; }

    button#submit-btn {
      width: 100%; margin-top: 1.25rem; padding: 0.75rem;
      background: #6366f1; color: white; border: none; border-radius: 8px;
      font-size: 1rem; font-weight: 600; cursor: pointer; transition: background 0.2s;
    }
    button#submit-btn:hover { background: #4f46e5; }
    button#submit-btn:disabled { background: #334155; color: #64748b; cursor: not-allowed; }

    #status { margin-top: 1rem; font-size: 0.85rem; color: #64748b; text-align: center; min-height: 1.2rem; }
    #status.error { color: #f87171; }
    #status.success { color: #4ade80; }

    #results { margin-top: 1.5rem; display: none; }
    #results h2 { font-size: 1rem; font-weight: 600; color: #cbd5e1; margin-bottom: 0.75rem; }
    .detection-list { display: flex; flex-direction: column; gap: 0.5rem; }
    .detection-item {
      display: flex; justify-content: space-between; align-items: center;
      background: #0f172a; border-radius: 8px; padding: 0.6rem 1rem;
      font-size: 0.88rem;
    }
    .detection-item .label { font-weight: 600; color: #a5b4fc; }
    .detection-item .conf-badge {
      background: #1e3a2f; color: #4ade80; border-radius: 999px;
      padding: 0.15rem 0.65rem; font-size: 0.78rem; font-weight: 700;
    }
    .detection-item .bbox { color: #64748b; font-size: 0.78rem; }
    .empty { color: #64748b; font-style: italic; text-align: center; padding: 1rem; }

    canvas { display: none; }
  </style>
</head>
<body>
  <h1>YOLO Object Detection</h1>
  <p class="subtitle">Upload an image and run inference</p>

  <div class="card">
    <div class="drop-zone" id="drop-zone">
      <input type="file" id="file-input" accept="image/*" />
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 16.5V19a2 2 0 002 2h14a2 2 0 002-2v-2.5M16 9l-4-4m0 0L8 9m4-4v12"/></svg>
      <p><span>Choisir une image</span> ou glisser-déposer</p>
      <p style="margin-top:.25rem">JPEG, PNG, WEBP</p>
    </div>

    <div id="preview-wrap">
      <canvas id="canvas"></canvas>
      <img id="preview" alt="preview" />
    </div>

    <div class="controls">
      <label class="conf-label">Confidence</label>
      <input type="range" id="conf-slider" min="0.05" max="0.95" step="0.05" value="0.5" />
      <span id="conf-value">0.50</span>
    </div>

    <button id="submit-btn" disabled>Détecter</button>
    <div id="status"></div>

    <div id="results">
      <h2 id="results-title"></h2>
      <div class="detection-list" id="detection-list"></div>
    </div>
  </div>

  <script>
    const fileInput = document.getElementById('file-input');
    const dropZone  = document.getElementById('drop-zone');
    const preview   = document.getElementById('preview');
    const previewWrap = document.getElementById('preview-wrap');
    const slider    = document.getElementById('conf-slider');
    const confValue = document.getElementById('conf-value');
    const btn       = document.getElementById('submit-btn');
    const status    = document.getElementById('status');
    const results   = document.getElementById('results');
    const detList   = document.getElementById('detection-list');
    const resultsTitle = document.getElementById('results-title');

    let selectedFile = null;

    slider.addEventListener('input', () => {
      confValue.textContent = parseFloat(slider.value).toFixed(2);
    });

    // Drag & drop
    dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
    dropZone.addEventListener('drop', e => {
      e.preventDefault();
      dropZone.classList.remove('dragover');
      const f = e.dataTransfer.files[0];
      if (f) loadFile(f);
    });

    fileInput.addEventListener('change', () => {
      if (fileInput.files[0]) loadFile(fileInput.files[0]);
    });

    function loadFile(f) {
      selectedFile = f;
      const url = URL.createObjectURL(f);
      preview.src = url;
      previewWrap.style.display = 'block';
      btn.disabled = false;
      status.textContent = '';
      status.className = '';
      results.style.display = 'none';
    }

    btn.addEventListener('click', async () => {
      if (!selectedFile) return;

      btn.disabled = true;
      status.textContent = 'Analyse en cours…';
      status.className = '';
      results.style.display = 'none';

      const formData = new FormData();
      formData.append('file', selectedFile);
      formData.append('confidence', slider.value);

      try {
        const res = await fetch('/detect', { method: 'POST', body: formData });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        showResults(data);
        status.textContent = `${data.count} objet(s) détecté(s)`;
        status.className = 'success';
      } catch (err) {
        status.textContent = `Erreur : ${err.message}`;
        status.className = 'error';
      } finally {
        btn.disabled = false;
      }
    });

    function showResults(data) {
      resultsTitle.textContent = `Détections — ${data.filename} (${data.count})`;
      detList.innerHTML = '';

      if (!data.detections || data.detections.length === 0) {
        detList.innerHTML = '<p class="empty">Aucun objet détecté.</p>';
      } else {
        data.detections.forEach(d => {
          const item = document.createElement('div');
          item.className = 'detection-item';
          const bbox = d.bbox ? `[${d.bbox.map(v => Math.round(v)).join(', ')}]` : '';
          item.innerHTML = `
            <span class="label">${d.class ?? d.label ?? 'object'}</span>
            <span class="bbox">${bbox}</span>
            <span class="conf-badge">${(d.confidence * 100).toFixed(1)}%</span>
          `;
          detList.appendChild(item);
        });
      }

      results.style.display = 'block';
    }
  </script>
</body>
</html>
